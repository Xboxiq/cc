<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative">
  <div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center;padding:12px 16px;transition:background .2s cubic-bezier(.34,1.56,.64,1)" style-hover="background:rgba(120,120,128,.04)">

    <!-- Colored icon square (SF Symbol style) -->
    <div style="position:relative;width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,{{ accent }},{{ accentDeep }});display:grid;place-items:center;box-shadow:0 2px 4px -1px {{ accentSoft }},inset 0 1px 0 rgba(255,255,255,.18)">
      <span class="num" style="font-size:11px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1">{{ shortName }}</span>
      <sc-if value="{{ isActive }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#fff;display:grid;place-items:center;box-shadow:0 1px 2px rgba(0,0,0,.18)">
          <span class="num" style="font-size:10px;font-weight:800;color:{{ accent }};line-height:1">{{ count }}</span>
        </div>
      </sc-if>
    </div>

    <!-- Title + subtitle -->
    <div style="min-width:0">
      <div style="display:flex;align-items:baseline;gap:6px">
        <span class="num" style="font-size:17px;font-weight:600;color:var(--label);letter-spacing:-.022em">{{ denomName }}</span>
        <span class="ar" style="font-size:13px;font-weight:500;color:var(--label-2)">د.ع</span>
      </div>
      <div class="ar" style="font-size:12px;color:{{ subtitleColor }};font-weight:500;margin-top:1px">{{ subtitle }}</div>
    </div>

    <!-- iOS-style stepper (pill with divider, value input in middle) -->
    <div style="display:flex;align-items:stretch;background:rgba(120,120,128,.12);border-radius:10px;height:36px;overflow:hidden">
      <button onClick="{{ onDec }}" aria-label="إنقاص" style="width:44px;display:grid;place-items:center;color:{{ stepColor }};transition:all .15s cubic-bezier(.34,1.56,.64,1)" style-hover="background:rgba(120,120,128,.16)" style-active="background:rgba(120,120,128,.24);transform:scale(.94)" style-focus="outline:2px solid {{ accent }};outline-offset:-2px;background:rgba(120,120,128,.12)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      </button>
      <div style="width:1px;background:rgba(60,60,67,.18);margin:6px 0"></div>
      <input type="number" min="0" max="99999" inputMode="numeric" value="{{ count }}" onInput="{{ onInput }}" onFocus="{{ onFocus }}" placeholder="0" aria-label="عدد الأوراق" class="num" style="width:54px;height:100%;border:none;background:transparent;text-align:center;font-size:15px;font-weight:600;color:var(--label);outline:none;padding:0;transition:background .15s" style-focus="background:rgba(120,120,128,.08)">
      <div style="width:1px;background:rgba(60,60,67,.18);margin:6px 0"></div>
      <button onClick="{{ onInc }}" aria-label="زيادة" style="width:44px;display:grid;place-items:center;color:{{ accent }};transition:all .15s cubic-bezier(.34,1.56,.64,1)" style-hover="background:{{ accentBg }}" style-active="background:{{ accentBg2 }};transform:scale(.94)" style-focus="outline:2px solid {{ accent }};outline-offset:-2px;background:{{ accentBg }}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Trailing subtotal -->
    <div style="text-align:left;min-width:96px">
      <div class="num" style="font-size:15px;font-weight:700;color:{{ subtotalColor }};letter-spacing:-.02em">{{ subtotalDisplay }}</div>
      <div class="ar" style="font-size:11px;color:var(--label-3);font-weight:500;margin-top:1px">د.ع</div>
    </div>
  </div>

  <!-- iOS-style separator: thin, indented under icon -->
  <sc-if value="{{ showSeparator }}" hint-placeholder-val="{{ true }}">
    <div style="height:.5px;background:var(--separator);margin-right:68px"></div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 680, &quot;height&quot;: 72},
  &quot;denom&quot;: {&quot;editor&quot;: null, &quot;default&quot;: {&quot;value&quot;: 1000, &quot;name&quot;: &quot;1,000&quot;, &quot;label&quot;: &quot;ألف&quot;, &quot;color&quot;: &quot;#007AFF&quot;}, &quot;tsType&quot;: &quot;{value:number,name:string,label:string,color:string}&quot;},
  &quot;count&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;tsType&quot;: &quot;number&quot;},
  &quot;isLast&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;},
  &quot;onChange&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;(n:number)=&gt;void&quot;}
}">
class Component extends DCLogic {
  fmt(n){ return Number(n).toLocaleString('en-US'); }
  // mix hex with black by amt
  darken(hex, amt) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16);
    const g = parseInt(c.substring(2,4),16);
    const b = parseInt(c.substring(4,6),16);
    const mix = (ch) => Math.round(ch * (1 - amt));
    return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
  }
  hexA(hex, alpha) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16);
    const g = parseInt(c.substring(2,4),16);
    const b = parseInt(c.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  // Short label for icon square: 250, 500, 1K, 5K, 10K, 25K, 50K
  shortName(v) {
    if (v < 1000) return String(v);
    if (v < 1000000) return (v/1000) + 'K';
    return (v/1000000) + 'M';
  }
  renderVals() {
    const d = this.props.denom || {};
    const count = this.props.count || 0;
    const onChange = this.props.onChange || (()=>{});
    const subtotal = (d.value || 0) * count;
    const accent = d.color || '#007AFF';
    const isLast = !!this.props.isLast;

    let subtitle = 'غير مفعّلة';
    if (count === 1) subtitle = 'ورقة واحدة';
    else if (count === 2) subtitle = 'ورقتان';
    else if (count > 2 && count < 11) subtitle = `${count} أوراق`;
    else if (count >= 11) subtitle = `${this.fmt(count)} ورقة`;

    return {
      denomName: d.name,
      shortName: this.shortName(d.value),
      accent,
      accentDeep: this.darken(accent, 0.18),
      accentSoft: this.hexA(accent, 0.35),
      accentBg: this.hexA(accent, 0.12),
      accentBg2: this.hexA(accent, 0.2),
      count,
      isActive: count > 0,
      subtitle,
      subtitleColor: count > 0 ? accent : 'var(--label-2)',
      subtotalDisplay: this.fmt(subtotal),
      subtotalColor: count > 0 ? 'var(--label)' : 'var(--label-3)',
      stepColor: count > 0 ? 'var(--label)' : 'var(--label-3)',
      showSeparator: !isLast,
      onInc: () => onChange(count + 1),
      onDec: () => onChange(Math.max(0, count - 1)),
      onInput: (e) => onChange(e.target.value),
      onFocus: (e) => e.target.select(),
    };
  }
}
</script>
</body>
</html>
