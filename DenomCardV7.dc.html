<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;border-radius:26px;overflow:hidden;transition:all .35s cubic-bezier(.16,1,.3,1);background:{{ cardBg }};border:{{ cardBorder }};box-shadow:{{ cardShadow }};backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%)" style-hover="transform:translateY(-3px);box-shadow:{{ cardShadowHover }};border-color:{{ accentBorder }}">

  <!-- Liquid Glass specular highlight -->
  <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);pointer-events:none;z-index:3;opacity:{{ specularOpacity }}"></div>

  <!-- TOP: premium banknote band -->
  <div style="position:relative;height:148px;background:linear-gradient(145deg,{{ accent }} 0%,{{ accentMid }} 48%,{{ accentDark }} 100%);overflow:hidden">
    <!-- glass gloss layer -->
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.06) 38%,transparent 62%);pointer-events:none"></div>
    <!-- mesh glow -->
    <div style="position:absolute;top:-40%;right:-20%;width:70%;height:140%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 65%);filter:blur(24px);pointer-events:none"></div>
    <div style="position:absolute;bottom:-50%;left:-15%;width:60%;height:120%;border-radius:50%;background:radial-gradient(circle,{{ accentGlow }},transparent 70%);filter:blur(30px);pointer-events:none"></div>

    <!-- geometric pattern -->
    <svg width="100%" height="100%" viewBox="0 0 440 148" preserveAspectRatio="none" style="position:absolute;inset:0;opacity:.1;pointer-events:none">
      <defs>
        <pattern id="geo-v7-{{ denomValue }}" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M20 0 L40 20 L20 40 L0 20 Z" stroke="#fff" stroke-width=".8" fill="none"/>
          <circle cx="20" cy="20" r="2.5" fill="#fff"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#geo-v7-{{ denomValue }})"/>
    </svg>

    <!-- watermark -->
    <div class="num" style="position:absolute;top:50%;left:8px;transform:translateY(-50%);font-size:clamp(72px,14vw,128px);font-weight:900;color:rgba(255,255,255,.14);letter-spacing:-.06em;line-height:1">{{ denomName }}</div>

    <!-- denomination badge -->
    <div style="position:absolute;top:20px;right:22px;display:flex;align-items:center;gap:14px">
      <div style="position:relative;width:52px;height:52px;border-radius:15px;background:rgba(255,255,255,.18);backdrop-filter:blur(20px) saturate(200%);-webkit-backdrop-filter:blur(20px) saturate(200%);border:.5px solid rgba(255,255,255,.35);display:grid;place-items:center;box-shadow:0 8px 24px -8px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.4)">
        <span class="ar" style="font-size:13px;font-weight:900;color:#fff;letter-spacing:-.02em">د.ع</span>
        <span style="position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--c-yellow,#FFCC00);box-shadow:0 0 0 2px rgba(255,255,255,.5)"></span>
      </div>
      <div>
        <div class="ar" style="font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase">فئة نقدية</div>
        <div class="num" style="font-size:clamp(28px,5vw,38px);font-weight:800;color:#fff;line-height:1;letter-spacing:-.03em;margin-top:2px">{{ denomName }}</div>
      </div>
    </div>

    <!-- label -->
    <div style="position:absolute;bottom:16px;right:22px;display:flex;align-items:center;gap:8px">
      <span style="width:20px;height:2px;border-radius:999px;background:rgba(255,255,255,.5)"></span>
      <span class="ar" style="font-size:14px;font-weight:700;color:rgba(255,255,255,.88)">{{ denomLabel }}</span>
    </div>

    <!-- active pill -->
    <sc-if value="{{ isActive }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;top:20px;left:22px;display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:.5px solid rgba(255,255,255,.28);box-shadow:0 4px 16px -4px rgba(0,0,0,.25)">
        <span style="width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.8)"></span>
        <span class="num ar" style="font-size:13px;font-weight:800;color:#fff">{{ count }} ورقة</span>
      </div>
    </sc-if>
  </div>

  <!-- BODY -->
  <div style="padding:22px 24px 24px">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <label class="ar" style="font-size:12px;font-weight:700;color:var(--label-2);letter-spacing:.1em;text-transform:uppercase">عدد الأوراق</label>
      <div class="num" style="font-size:12px;font-weight:600;color:var(--label-3)">× {{ denomName }} د.ع</div>
    </div>

    <!-- Glass stepper -->
    <div style="display:grid;grid-template-columns:52px 1fr 52px;gap:10px;align-items:stretch">
      <button onClick="{{ onDec }}" onMouseDown="{{ onHoldDec }}" onMouseUp="{{ onHoldEnd }}" onMouseLeave="{{ onHoldEnd }}" title="اضغط مطولاً للنقص" style="height:54px;border-radius:16px;background:var(--press-bg);color:var(--label);font-size:22px;font-weight:600;display:grid;place-items:center;transition:all .2s;border:.5px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)" style-hover="background:{{ decHoverBg }};color:var(--c-red)" style-active="transform:scale(.94)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>
      </button>
      <input type="number" min="0" max="99999" value="{{ count }}" onInput="{{ onInput }}" onFocus="{{ onFocus }}" placeholder="0" class="num" style="height:54px;width:100%;border:.5px solid var(--glass-border);border-radius:16px;background:var(--glass-bg-strong);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);text-align:center;font-size:clamp(22px,4vw,28px);font-weight:800;color:var(--label);outline:none;transition:all .2s" style-focus="border-color:{{ accent }};box-shadow:0 0 0 4px {{ accentSoft }},inset 0 1px 0 rgba(255,255,255,.08)">
      <button onClick="{{ onInc }}" onMouseDown="{{ onHoldInc }}" onMouseUp="{{ onHoldEnd }}" onMouseLeave="{{ onHoldEnd }}" title="اضغط مطولاً للزيادة" style="height:54px;border-radius:16px;background:linear-gradient(145deg,{{ accent }},{{ accentDark }});color:#fff;font-size:22px;font-weight:600;display:grid;place-items:center;transition:all .2s;box-shadow:0 6px 20px -6px {{ accentSoft }},inset 0 1px 0 rgba(255,255,255,.25)" style-hover="filter:brightness(1.1);transform:translateY(-1px)" style-active="transform:scale(.94)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Quick-add chips -->
    <div style="display:flex;gap:7px;margin-top:14px">
      <sc-for list="{{ quickAdds }}" as="q" hint-placeholder-count="4">
        <button onClick="{{ q.onClick }}" class="num" style="flex:1;height:34px;border-radius:11px;background:var(--glass-bg);border:.5px solid var(--glass-border);color:var(--label-2);font-size:13px;font-weight:700;transition:all .2s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)" style-hover="background:{{ accentChipBg }};border-color:{{ accentBorder }};color:{{ accent }}">+{{ q.label }}</button>
      </sc-for>
    </div>

    <!-- Subtotal glass panel -->
    <div style="margin-top:18px;padding:16px 18px;border-radius:18px;background:{{ subtotalBg }};border:.5px solid {{ subtotalBorder }};display:flex;align-items:center;justify-content:space-between;transition:all .3s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:10px;background:{{ subtotalIconBg }};display:grid;place-items:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="{{ subtotalIcon }}" stroke-width="2.4" stroke-linecap="round"/></svg>
        </div>
        <span class="ar" style="font-size:14px;font-weight:700;color:{{ subtotalLabel }}">المجموع الفرعي</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span class="num" style="font-size:clamp(22px,4vw,28px);font-weight:800;color:{{ subtotalColor }};letter-spacing:-.025em">{{ subtotalDisplay }}</span>
        <span class="ar" style="font-size:12px;font-weight:700;color:{{ subtotalLabel }}">د.ع</span>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 440, &quot;height&quot;: 360},
  &quot;denom&quot;: {&quot;editor&quot;: null, &quot;default&quot;: {&quot;value&quot;: 1000, &quot;name&quot;: &quot;1,000&quot;, &quot;label&quot;: &quot;ألف&quot;, &quot;base&quot;: &quot;#007AFF&quot;, &quot;dark&quot;: &quot;#0040DD&quot;}, &quot;tsType&quot;: &quot;{value:number,name:string,label:string,base:string,dark:string}&quot;},
  &quot;count&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;tsType&quot;: &quot;number&quot;},
  &quot;onChange&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;(n:number)=&gt;void&quot;}
}">
class Component extends DCLogic {
  fmt(n){ return Number(n).toLocaleString('en-US'); }
  hexA(hex, alpha) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16);
    const g = parseInt(c.substring(2,4),16);
    const b = parseInt(c.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  lighten(hex, amt) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16);
    const g = parseInt(c.substring(2,4),16);
    const b = parseInt(c.substring(4,6),16);
    const mix = (ch) => Math.round(ch + (255 - ch) * amt);
    return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
  }
  componentWillUnmount() { this.clearHold(); }
  clearHold() { if (this._holdT) { clearInterval(this._holdT); this._holdT = null; } }
  renderVals() {
    const d = this.props.denom || {};
    const count = this.props.count || 0;
    const onChange = this.props.onChange || (()=>{});
    const subtotal = (d.value || 0) * count;
    const accent = d.base || d.color || '#007AFF';
    const accentDark = d.dark || accent;
    const accentMid = this.lighten(accent, 0.15);
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    const quickAdds = [10, 25, 50, 100].map(q => ({
      label: q,
      onClick: () => onChange(count + q),
    }));

    const startHold = (delta) => {
      this.clearHold();
      let current = count;
      this._holdT = setInterval(() => {
        current = Math.max(0, current + delta);
        onChange(current);
      }, 100);
    };

    return {
      denomName: d.name,
      denomLabel: d.label,
      denomValue: d.value,
      accent, accentMid, accentDark,
      accentSoft: this.hexA(accent, isDark ? 0.45 : 0.3),
      accentGlow: this.hexA(accent, 0.35),
      accentBorder: count > 0 ? this.hexA(accent, isDark ? 0.55 : 0.4) : 'var(--glass-border)',
      accentChipBg: this.hexA(accent, isDark ? 0.18 : 0.1),
      cardBg: isDark ? 'rgba(255,255,255,.04)' : 'rgba(255,255,255,.72)',
      cardBorder: count > 0
        ? `0.5px solid ${this.hexA(accent, isDark ? 0.5 : 0.35)}`
        : '0.5px solid var(--glass-border)',
      cardShadow: count > 0
        ? `0 20px 50px -20px ${this.hexA(accent, isDark ? 0.5 : 0.25)}, var(--glass-shadow)`
        : 'var(--glass-shadow)',
      cardShadowHover: count > 0
        ? `0 28px 60px -18px ${this.hexA(accent, isDark ? 0.6 : 0.35)}, var(--glass-shadow)`
        : '0 24px 56px -16px rgba(0,0,0,.18), var(--glass-shadow)',
      specularOpacity: isDark ? 0.35 : 0.6,
      decHoverBg: isDark ? 'rgba(255,59,48,.18)' : 'rgba(255,59,48,.1)',
      count,
      isActive: count > 0,
      subtotalDisplay: this.fmt(subtotal),
      subtotalBg: count > 0 ? this.hexA(accent, isDark ? 0.14 : 0.08) : (isDark ? 'rgba(255,255,255,.04)' : 'rgba(0,0,0,.03)'),
      subtotalBorder: count > 0 ? this.hexA(accent, isDark ? 0.35 : 0.2) : 'var(--glass-border)',
      subtotalColor: count > 0 ? accent : 'var(--label-3)',
      subtotalLabel: count > 0 ? this.hexA(accent, 0.9) : 'var(--label-3)',
      subtotalIcon: count > 0 ? accent : 'var(--label-3)',
      subtotalIconBg: count > 0 ? this.hexA(accent, isDark ? 0.22 : 0.12) : 'var(--press-bg)',
      onInc: () => onChange(count + 1),
      onDec: () => onChange(Math.max(0, count - 1)),
      onInput: (e) => onChange(e.target.value),
      onFocus: (e) => e.target.select(),
      onHoldInc: () => startHold(1),
      onHoldDec: () => startHold(-1),
      onHoldEnd: () => this.clearHold(),
      quickAdds,
    };
  }
}
</script>
</body>
</html>
