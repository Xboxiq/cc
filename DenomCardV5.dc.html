<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;background:#ffffff;border:1px solid {{ cardBorder }};border-radius:18px;overflow:hidden;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 2px rgba(15,23,42,.04)" style-hover="transform:translateY(-2px);box-shadow:0 16px 36px -16px rgba(15,23,42,.18);border-color:{{ accentSoft }}">

  <!-- TOP: stylized banknote header -->
  <div style="position:relative;height:104px;background:linear-gradient(135deg,{{ tint }} 0%,#fff 100%);overflow:hidden;border-bottom:1px dashed {{ accentSoft }}">
    <!-- subtle islamic geometric pattern overlay -->
    <svg width="100%" height="100%" viewBox="0 0 280 104" preserveAspectRatio="none" style="position:absolute;inset:0;opacity:.07;pointer-events:none">
      <defs>
        <pattern id="geo-{{ denomValue }}" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
          <path d="M18 0 L36 18 L18 36 L0 18 Z" stroke="{{ ink }}" stroke-width="1" fill="none"/>
          <circle cx="18" cy="18" r="3" fill="{{ ink }}"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#geo-{{ denomValue }})"/>
    </svg>

    <!-- big watermark -->
    <div class="num" style="position:absolute;top:50%;left:-6px;transform:translateY(-50%);font-size:96px;font-weight:900;color:{{ ink }};opacity:.09;letter-spacing:-.05em;line-height:1;font-family:'Plus Jakarta Sans',sans-serif">{{ denomName }}</div>

    <!-- denomination chip top-right -->
    <div style="position:absolute;top:14px;right:16px;display:flex;align-items:center;gap:8px">
      <!-- 3D chip -->
      <div style="position:relative;width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,{{ accent }},{{ accentDark }});display:grid;place-items:center;box-shadow:0 6px 14px -4px {{ accentSoft }},inset 0 1px 0 rgba(255,255,255,.25)">
        <span style="font-family:'Cairo';font-size:11px;font-weight:800;color:#fff;letter-spacing:-.02em">د.ع</span>
        <!-- gold corner -->
        <span style="position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:#f4c430;box-shadow:0 0 0 1.5px #fff"></span>
      </div>
      <div>
        <div style="font-family:'Cairo';font-size:10px;font-weight:700;color:{{ ink }};opacity:.6;letter-spacing:.08em;text-transform:uppercase">فئة</div>
        <div class="num" style="font-size:22px;font-weight:800;color:{{ ink }};line-height:1;letter-spacing:-.02em">{{ denomName }}</div>
      </div>
    </div>

    <!-- spelled name bottom right -->
    <div style="position:absolute;bottom:10px;right:16px;display:flex;align-items:center;gap:6px">
      <span style="width:14px;height:1px;background:{{ accent }};opacity:.4"></span>
      <span style="font-family:'Cairo';font-size:11px;font-weight:600;color:{{ ink }};opacity:.65">{{ denomLabel }}</span>
    </div>

    <!-- active state pill -->
    <sc-if value="{{ isActive }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;top:14px;left:16px;display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.1);border:1px solid {{ accentSoft }}">
        <span style="width:5px;height:5px;border-radius:50%;background:{{ accent }};box-shadow:0 0 0 2px {{ accentSoft }}"></span>
        <span class="num" style="font-size:11px;font-weight:800;color:{{ ink }}">{{ count }}× ورقة</span>
      </div>
    </sc-if>
  </div>

  <!-- BODY -->
  <div style="padding:16px 18px 18px">

    <!-- Label row -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <label style="font-family:'Cairo';font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase">عدد الأوراق</label>
      <div class="num" style="font-size:10px;font-weight:600;color:var(--ink-4);letter-spacing:.05em">× {{ denomName }} د.ع</div>
    </div>

    <!-- Refined stepper -->
    <div style="display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:stretch">
      <button onClick="{{ onDec }}" onMouseDown="{{ onHoldDec }}" onMouseUp="{{ onHoldEnd }}" onMouseLeave="{{ onHoldEnd }}" title="اضغط مطولاً للنقص بسرعة" style="height:44px;border-radius:12px;background:var(--bg-2);color:var(--ink-2);font-size:20px;font-weight:600;display:grid;place-items:center;transition:all .15s;border:1px solid var(--line)" style-hover="background:#fee2e2;border-color:#fecaca;color:#b91c1c" style-active="transform:scale(.94)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      </button>
      <input type="number" min="0" max="99999" value="{{ count }}" onInput="{{ onInput }}" onFocus="{{ onFocus }}" placeholder="0" class="num" style="height:44px;width:100%;border:1px solid var(--line);border-radius:12px;background:#fafbfd;text-align:center;font-size:20px;font-weight:800;color:var(--ink);outline:none;transition:all .15s;font-family:'Plus Jakarta Sans','Cairo',sans-serif" style-focus="border-color:{{ accent }};background:#fff;box-shadow:0 0 0 3px {{ accentSoft }}">
      <button onClick="{{ onInc }}" onMouseDown="{{ onHoldInc }}" onMouseUp="{{ onHoldEnd }}" onMouseLeave="{{ onHoldEnd }}" title="اضغط مطولاً للزيادة بسرعة" style="height:44px;border-radius:12px;background:linear-gradient(135deg,{{ accent }},{{ accentDark }});color:#fff;font-size:20px;font-weight:600;display:grid;place-items:center;transition:all .15s;box-shadow:0 4px 12px -4px {{ accentSoft }},inset 0 1px 0 rgba(255,255,255,.18)" style-hover="filter:brightness(1.08);transform:translateY(-1px)" style-active="transform:scale(.94)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Quick-add chips -->
    <div style="display:flex;gap:5px;margin-top:10px">
      <sc-for list="{{ quickAdds }}" as="q" hint-placeholder-count="4">
        <button onClick="{{ q.onClick }}" class="num" style="flex:1;height:28px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--ink-3);font-size:12px;font-weight:700;transition:all .15s" style-hover="background:{{ accentChipBg }};border-color:{{ accentSoft }};color:{{ ink }}">+{{ q.label }}</button>
      </sc-for>
    </div>

    <!-- Subtotal section -->
    <div style="margin-top:14px;padding:13px 14px;border-radius:12px;background:{{ subtotalBg }};display:flex;align-items:center;justify-content:space-between;transition:all .25s;border:1px solid {{ subtotalBorder }}">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="{{ subtotalIcon }}" stroke-width="2.2" stroke-linecap="round"/></svg>
        <span style="font-family:'Cairo';font-size:12px;font-weight:700;color:{{ subtotalLabel }}">المجموع الفرعي</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="num" style="font-size:20px;font-weight:800;color:{{ subtotalColor }};letter-spacing:-.02em">{{ subtotalDisplay }}</span>
        <span style="font-family:'Cairo';font-size:11px;font-weight:700;color:{{ subtotalLabel }}">د.ع</span>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 320, &quot;height&quot;: 280},
  &quot;denom&quot;: {&quot;editor&quot;: null, &quot;default&quot;: {&quot;value&quot;: 1000, &quot;name&quot;: &quot;1,000&quot;, &quot;label&quot;: &quot;ألف&quot;, &quot;color&quot;: &quot;#6d28d9&quot;, &quot;tint&quot;: &quot;#faf5ff&quot;, &quot;ink&quot;: &quot;#5b21b6&quot;}, &quot;tsType&quot;: &quot;{value:number,name:string,label:string,color:string,tint:string,ink:string}&quot;},
  &quot;count&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 7, &quot;tsType&quot;: &quot;number&quot;},
  &quot;onChange&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;(n:number)=&gt;void&quot;}
}">
class Component extends DCLogic {
  fmt(n){ return Number(n).toLocaleString('en-US'); }
  hexA(hex, alpha) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16);
    const g = parseInt(c.substring(2,4),16);
    const b = parseInt(c.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  darken(hex, amt) {
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16);
    const g = parseInt(c.substring(2,4),16);
    const b = parseInt(c.substring(4,6),16);
    const mix = (ch) => Math.round(ch * (1 - amt));
    return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
  }
  componentWillUnmount() { this.clearHold(); }
  clearHold() { if (this._holdT) { clearInterval(this._holdT); this._holdT = null; } }
  renderVals() {
    const d = this.props.denom || {};
    const count = this.props.count || 0;
    const onChange = this.props.onChange || (()=>{});
    const subtotal = (d.value || 0) * count;
    const accent = d.color || '#232350';
    const ink = d.ink || '#0f172a';
    const tint = d.tint || '#f5f6fa';

    const quickAdds = [10, 25, 50, 100].map(q => ({
      label: q,
      onClick: () => onChange(count + q),
    }));

    const startHold = (delta) => {
      this.clearHold();
      let current = count;
      this._holdT = setInterval(() => {
        current = Math.max(0, current + delta);
        onChange(current);
      }, 100);
    };

    return {
      denomName: d.name,
      denomLabel: d.label,
      denomValue: d.value,
      tint, ink, accent,
      accentDark: this.darken(accent, 0.18),
      accentSoft: this.hexA(accent, 0.35),
      accentChipBg: this.hexA(accent, 0.08),
      cardBorder: count > 0 ? this.hexA(accent, 0.25) : 'var(--line)',
      count,
      isActive: count > 0,
      subtotalDisplay: this.fmt(subtotal),
      subtotalBg: count > 0 ? this.hexA(accent, 0.06) : '#fafbfd',
      subtotalBorder: count > 0 ? this.hexA(accent, 0.18) : 'var(--line-2)',
      subtotalColor: count > 0 ? accent : 'var(--ink-4)',
      subtotalLabel: count > 0 ? this.hexA(accent, 0.85) : 'var(--ink-4)',
      subtotalIcon: count > 0 ? accent : 'var(--ink-4)',
      onInc: () => onChange(count + 1),
      onDec: () => onChange(Math.max(0, count - 1)),
      onInput: (e) => onChange(e.target.value),
      onFocus: (e) => e.target.select(),
      onHoldInc: () => startHold(1),
      onHoldDec: () => startHold(-1),
      onHoldEnd: () => this.clearHold(),
      quickAdds,
    };
  }
}
</script>
</body>
</html>
